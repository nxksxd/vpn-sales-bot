version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: vpn-bot-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-vpn_bot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vpn_bot_change_me}
      POSTGRES_DB: ${POSTGRES_DB:-vpn_bot}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - vpn-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vpn_bot} -d ${POSTGRES_DB:-vpn_bot}"]
      interval: 10s
      timeout: 5s
      retries: 5

  vpn-bot:
    build: .
    container_name: vpn-bot
    restart: always
    env_file:
      - .env
    ports:
      - "${YOOKASSA_WEBHOOK_PORT:-8080}:${YOOKASSA_WEBHOOK_PORT:-8080}"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - bot-data:/app/data
      - bot-logs:/app/logs
    networks:
      - vpn-net
    healthcheck:
      test: ["CMD", "python3", "scripts/healthcheck.py"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  bot-data:
  bot-logs:
  postgres-data:

networks:
  vpn-net:
    driver: bridge
