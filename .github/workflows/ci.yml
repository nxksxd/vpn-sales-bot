name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Compile code
        run: python -m compileall bot scripts tests
      - name: Lint
        run: ruff check bot tests scripts
      - name: Type check
        run: mypy bot
      - name: Run tests
        run: pytest -q
      - name: Validate migrations directory
        run: test -d migrations/versions
      - name: Build Docker image
        run: docker build .
